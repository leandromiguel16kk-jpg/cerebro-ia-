<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cerebro IA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f1117; }
        iframe { border: none; width: 100%; height: 100%; }
        .splash { position: fixed; inset: 0; background: #0f1117; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: 0.5s; }
        .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .text { color: white; font-family: sans-serif; font-weight: bold; letter-spacing: 2px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="logo">🧠</div>
        <div class="text">CEREBRO IA</div>
    </div>
    <iframe id="app-frame" src="https://cerebro-ia-production.up.railway.app/chat"></iframe>

    <script>
        const frame = document.getElementById('app-frame');
        const splash = document.getElementById('splash');
        
        // Esconder splash quando o frame carregar
        frame.onload = () => {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1000);
        };

        // Fallback caso demore muito
        setTimeout(() => {
            if (splash.style.display !== 'none') {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }, 5000);
    </script>
</body>
</html>
