<!DOCTYPE html>
<html lang="pt-BR" data-tema="{{ current_user.tema if current_user.is_authenticated else 'dark' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{% block titulo %}Cerebro IA{% endblock %}</title>

<!-- PWA -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#4f8ef7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cerebro IA">
<meta name="application-name" content="Cerebro IA">
<meta name="description" content="Sua inteligencia artificial pessoal">

<!-- Icones -->
<link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
<link rel="apple-touch-icon" sizes="152x152" href="{{ url_for('static', filename='icons/icon-152.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
{% with msgs = get_flashed_messages(with_categories=true) %}
{% if msgs %}
<div class="flash-container">
{% for cat, msg in msgs %}
<div class="flash flash-{{ cat }}">{{ msg }}</div>
{% endfor %}
</div>
{% endif %}
{% endwith %}
{% block conteudo %}{% endblock %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% block scripts %}{% endblock %}
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log('PWA ativo'))
    .catch(e => console.log('SW erro:', e));
}
</script>
</body>
</html>
