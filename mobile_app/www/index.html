<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Mobile</title>
    <style>
        /* Estilos simplificados para mobile */
        body { font-family: sans-serif; background: #343541; color: white; margin: 0; padding: 0; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; background: #202123; text-align: center; font-weight: bold; border-bottom: 1px solid #4d4d4f; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 85%; }
        .user { background: #40414f; align-self: flex-end; margin-left: auto; }
        .bot { background: #444654; align-self: flex-start; }
        #input-area { padding: 15px; background: #343541; display: flex; gap: 10px; border-top: 1px solid #4d4d4f; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #565869; background: #40414f; color: white; outline: none; }
        button { background: #19c37d; border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        #config { position: fixed; top: 10px; right: 10px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            Nexus AI - Mobile Beta
            <div id="config">
                <button onclick="setIP()" style="padding: 5px 10px; font-size: 10px;">Config IP</button>
            </div>
        </div>
        <div id="chat" id="chat-box">
            <div class="msg bot">Conecte ao IP do seu PC para começar.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-in" placeholder="Digite aqui...">
            <button onclick="send()">Enviar</button>
        </div>
    </div>

    <script>
        let serverIP = localStorage.getItem('nexus_ip') || 'http://SEU_IP_AQUI:5000';
        const chatBox = document.getElementById('chat');

        function setIP() {
            const ip = prompt("Digite o IP do seu PC (ex: http://192.168.1.10:5000):", serverIP);
            if (ip) {
                serverIP = ip;
                localStorage.setItem('nexus_ip', ip);
                alert("IP configurado!");
            }
        }

        async function send() {
            const input = document.getElementById('user-in');
            const text = input.value.trim();
            if (!text) return;

            append('user', text);
            input.value = '';

            try {
                const res = await fetch(`${serverIP}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{role: 'user', content: text}], model: 'llama3' })
                });
                const data = await res.json();
                append('bot', data.content || data.error);
            } catch (e) {
                append('bot', "Erro de conexão. Verifique o IP e se o servidor no PC está ligado.");
            }
        }

        function append(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
